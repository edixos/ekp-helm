{{- range $name, $config := .Values.gateways -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $name }}
  namespace: {{ $config.namespace }}
  labels:
    {{- include "envoy-gateway.labels" $ | nindent 4 }}
spec:
  gatewayClassName: {{ $config.gatewayClassName }}
  listeners:
{{ toYaml $config.listeners | indent 4 }}
---
{{ end -}}
