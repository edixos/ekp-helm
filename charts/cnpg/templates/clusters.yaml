{{- range .Values.cnpg.clusters }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .name }}
  namespace: {{ .namespace | default $.Release.Namespace }}
  labels:
    {{- include "cnpg.labels" $ | nindent 4 }}
spec:
  instances: {{ .instances | default 3 }}
  storage:
    size: {{ .storage.size | default "10Gi" }}
    {{- if .storage.storageClass }}
    storageClass: {{ .storage.storageClass }}
    {{- end }}
  {{- range $key, $val := omit . "name" "namespace" "instances" "storage" }}
  {{ $key }}:
    {{- toYaml $val | nindent 4 }}
  {{- end }}
{{- end }}