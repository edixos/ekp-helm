{{- range .Values.passwords }}
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
{{- if .labels }}
  labels:
{{ toYaml .labels | indent 4 }}
{{- end }}
{{- if .annotations }}
  annotations:
{{ toYaml .annotations | indent 4 }}
{{- end }}
spec:
{{ toYaml .spec | indent 2 }}
{{- end }}
