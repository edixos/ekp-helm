{{- if .Values.dex.httproute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "dex.fullname" . }}
  labels:
{{ include "call-nested" (list . "dex" "dex.labels") | indent 4 }}
spec:
  parentRefs:
{{ toYaml .Values.httproute.parentRefs | indent 4 }}
  hostnames:
{{ toYaml .Values.httproute.hostnames | indent 4 }}
  rules:
{{ toYaml .Values.httproute.rules | indent 4 }}
{{- end }}
