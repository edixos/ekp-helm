kube-ovn:
  global:
    registry:
      address: docker.io/kubeovn
    images:
      kubeovn:
        repository: kube-ovn
        tag: v1.15.8
        support_arm: true

  image:
    pullPolicy: IfNotPresent

  namespace: kube-system

  networking:
    stack: "IPv4"
    pods:
      cidr:
        v4: "10.16.0.0/16"
      gateways:
        v4: "10.16.0.1"
    services:
      cidr:
        v4: "10.96.0.0/12"
    join:
      cidr:
        v4: "100.64.0.0/16"

  features:
    enableLoadbalancer: true
    enableNetworkPolicies: true
    enableExternalVpcs: true
    enableNatGateways: true
    enableKeepVmIps: true

  masterNodes: []
  masterNodesLabels: {}

  central:
    extraEnv:
      - name: NODE_IPS
        valueFrom:
          configMapKeyRef:
            name: kube-ovn-master-nodes
            key: MASTER_NODES

    controller:
      extraEnv:
        - name: NODE_IPS
          valueFrom:
            configMapKeyRef:
              name: kube-ovn-master-nodes
              key: MASTER_NODES

    ovsOvn:
      extraEnv:
        - name: NODE_IPS
          valueFrom:
            configMapKeyRef:
              name: kube-ovn-master-nodes
              key: MASTER_NODES

    agent:
      extraEnv:
        - name: NODE_IPS
          valueFrom:
            configMapKeyRef:
              name: kube-ovn-master-nodes
              key: MASTER_NODES