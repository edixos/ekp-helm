name: Test Issue Creation

on:
  workflow_dispatch:
    inputs:
      chart_name:
        description: "Chart name to simulate a failure for"
        required: true
        default: "alertmanager"
      error_message:
        description: "Simulated error message"
        required: false
        default: |
          Version increment checking disabled.
          Error: failed linting charts: failed processing charts

permissions:
  contents: read
  issues: write

jobs:
  test-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install semver ruamel.yaml requests

      - name: Trigger issue creation
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, "scripts")
          from bump_dependencies import HelmChartUpdater

          chart_name = "${{ inputs.chart_name }}"
          error_message = """${{ inputs.error_message }}"""

          updater = HelmChartUpdater(dry_run=False, skip_pr=True, update_values=False)
          updater.create_github_issue(chart_name, error_message.strip())
          EOF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
