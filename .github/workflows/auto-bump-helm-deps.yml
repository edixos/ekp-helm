name: Auto Bump Helm Dependencies

on:
  schedule:
    - cron: "0 10 * * 3"
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
  issues: write
  

jobs:
  bump-helm-deps:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: "false"
      SKIP_PR: "false"
      UPDATE_VALUES: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools (helm-docs, ct, pluto, promtool)
        run: |
          HELM_DOCS_VERSION="1.14.2"
          CT_VERSION="3.12.0"
          PLUTO_VERSION="5.20.3"
          PROMTOOL_VERSION="3.4.1"

          # Download all tools in parallel
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" -o /tmp/helm-docs.tar.gz &
          curl -fsSL "https://github.com/helm/chart-testing/releases/download/v${CT_VERSION}/chart-testing_${CT_VERSION}_linux_amd64.tar.gz" -o /tmp/ct.tar.gz &
          curl -fsSL "https://github.com/FairwindsOps/pluto/releases/download/v${PLUTO_VERSION}/pluto_${PLUTO_VERSION}_linux_amd64.tar.gz" -o /tmp/pluto.tar.gz &
          curl -fsSL "https://github.com/prometheus/prometheus/releases/download/v${PROMTOOL_VERSION}/prometheus-${PROMTOOL_VERSION}.linux-amd64.tar.gz" -o /tmp/promtool.tar.gz &
          wait

          # Extract and install all tools
          tar -xzf /tmp/helm-docs.tar.gz -C /tmp helm-docs
          tar -xzf /tmp/ct.tar.gz -C /tmp ct
          tar -xzf /tmp/pluto.tar.gz -C /tmp pluto
          tar -xzf /tmp/promtool.tar.gz -C /tmp --strip-components=1 "prometheus-${PROMTOOL_VERSION}.linux-amd64/promtool"
          sudo mv /tmp/helm-docs /tmp/ct /tmp/pluto /tmp/promtool /usr/local/bin/

      - name: Add our Helm repo
        run: |
          helm repo add ekp-helm https://edixos.github.io/ekp-helm
          helm repo update

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run bump-dependencies script
        id: bump-dependencies
        run: |
          python scripts/bump_dependencies.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request using GitHub CLI
        if: steps.bump-dependencies.outputs.updated == 'true' && env.SKIP_PR == 'false' && env.DRY_RUN == 'false'
        run: |
          BRANCH="${{ steps.bump-dependencies.outputs.branch }}"
          PR_TITLE="chore(deps-bump): auto bumped helm dependencies"
          
          # Write PR body from multiline output
          printf '%s\n' "$PR_BODY" > pr_body.md
          
          TOKEN="${GITHUB_TOKEN}"
          unset GITHUB_TOKEN
          
          # Authenticate and create PR using file
          echo "$TOKEN" | gh auth login --with-token
          PR_URL=$(gh pr create --title "$PR_TITLE" --body-file pr_body.md --base main --head "$BRANCH")
          echo "Created PR: $PR_URL"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ steps.bump-dependencies.outputs.pr_body }}
